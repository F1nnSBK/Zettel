name: Ingest Markdown Notes

on:
  push:
    paths:
      - "**.md"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send changed markdown files to ingest API
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import subprocess
          import uuid  # <-- WICHTIG: UUID Modul importiert

          ingest_url = os.environ["INGEST_URL"]
          api_key = os.environ["API_KEY"]

          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True,
              text=True
          )

          files = result.stdout.strip().split("\n")
          md_files = [f for f in files if f.endswith(".md")]

          print("Changed files:", md_files)

          for path in md_files:
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()

                  # 1. Den alten String generieren (z.B. "Ordner__Zettel")
                  string_id = path.replace("/", "__").replace(".md", "")
                  
                  # 2. In eine deterministische UUID v5 umwandeln!
                  note_id = str(uuid.uuid5(uuid.NAMESPACE_DNS, string_id))

                  payload = {
                      "id": note_id,
                      "file_path": path,
                      "markdown_content": content
                  }

                  headers = {
                      "x-api-key": api_key,
                      "Content-Type": "application/json"
                  }

                  r = requests.post(ingest_url, json=payload, headers=headers)

                  print(f"{path} ({note_id}) -> {r.status_code}")

                  if r.status_code != 200:
                      print(r.text)

              except FileNotFoundError:
                  print(f"Deleted or missing: {path}")
          EOF