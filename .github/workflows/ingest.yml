name: Ingest Markdown Notes

on:
  push:
    paths:
      - "**.md"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send changed markdown files to ingest API
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # FIX 1: Git anweisen, Pfade nicht zu escapen (wichtig für Umlaute!)
          git config core.quotepath false
          
          python - << 'EOF'
          import os
          import requests
          import subprocess
          import uuid

          ingest_url = os.environ["INGEST_URL"]
          api_key = os.environ["API_KEY"]

          # FIX 2: Explizites Encoding beim Auslesen des Git Diff
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True,
              text=True,
              encoding='utf-8'
          )

          files = result.stdout.strip().split("\n")
          # Filtern leerer Strings und nur .md Dateien
          md_files = [f for f in files if f and f.endswith(".md")]

          print(f"Detected {len(md_files)} changed files: {md_files}")

          for path in md_files:
              # Wir strippen mögliche Anführungszeichen, falls Git sie doch setzt
              clean_path = path.strip('"')
              
              if not os.path.exists(clean_path):
                  print(f"Skipping (not found): {clean_path}")
                  continue

              try:
                  with open(clean_path, "r", encoding="utf-8") as f:
                      content = f.read()

                  # ID Generierung (Umlaute in der ID sind für UUIDv5 kein Problem)
                  string_id = clean_path.replace("/", "__").replace(".md", "")
                  note_id = str(uuid.uuid5(uuid.NAMESPACE_DNS, string_id))

                  payload = {
                      "id": note_id,
                      "file_path": clean_path,
                      "markdown_content": content
                  }

                  headers = {
                      "x-api-key": api_key,
                      "Content-Type": "application/json"
                  }

                  r = requests.post(ingest_url, json=payload, headers=headers)
                  print(f"Ingested: {clean_path} -> Status {r.status_code}")

                  if r.status_code != 200:
                      print(f"Error details: {r.text}")

              except Exception as e:
                  print(f"Failed to process {clean_path}: {str(e)}")
          EOF